# Bruce capability registry (v1). Machine-readable source of truth mapping the capability universe
# (bruce_complete_capability_universe_voice_life_finance_v2.md) to real code + honest status.
#
# STATUS is honest and evidence-based. Nothing is `implemented`/`deployed`/`live_verified` merely
# because an interface, schema, prompt, fake adapter, or test fixture exists.
#   implemented    code + tests exist and pass, not necessarily deployed
#   partial        some real behavior, known gaps
#   mock_only      UI/interface/fixture only, no real behavior
#   deployed       running in staging (may be flag-gated / not live-verified)
#   live_verified  proven end-to-end against the real external system with a real user
#   planned        designed / next, not built
#   blocked        needs a decision/credential/approval before it can proceed
#   partner_required  needs an external partner/agreement (e.g. Apple MfB, payment provider)
#   unsupported    intentionally not built (policy / platform limit)
#
# Capabilities are grouped UNDER shared platform primitives (the universe's 36) to avoid fake breadth:
# a primitive that unlocks ten real outcomes beats ten disconnected feature tickets.

meta:
  version: 1
  source_universe: bruce_complete_capability_universe_voice_life_finance_v2.md
  repo_commit_at_audit: 8bec4a5
  staging_commit: 8bec4a5           # api + worker; migration head 0011; conversation flag OFF
  note: >
    live iMessage remains UNVERIFIED (dedicated-Mac dry-run pending); the conversation runtime is
    deployed but flag-gated OFF; account linking is the only messaging capability live-verified.

