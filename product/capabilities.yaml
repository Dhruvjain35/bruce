# Bruce capability registry (v1). Machine-readable source of truth mapping the capability universe
# (bruce_complete_capability_universe_voice_life_finance_v2.md) to real code + honest status.
#
# STATUS is honest and evidence-based. Nothing is `implemented`/`deployed`/`live_verified` merely
# because an interface, schema, prompt, fake adapter, or test fixture exists.
#   implemented    code + tests exist and pass, not necessarily deployed
#   partial        some real behavior, known gaps
#   mock_only      UI/interface/fixture only, no real behavior
#   deployed       running in staging (may be flag-gated / not live-verified)
#   live_verified  proven end-to-end against the real external system with a real user
#   planned        designed / next, not built
#   blocked        needs a decision/credential/approval before it can proceed
#   partner_required  needs an external partner/agreement (e.g. Apple MfB, payment provider)
#   unsupported    intentionally not built (policy / platform limit)
#
# Capabilities are grouped UNDER shared platform primitives (the universe's 36) to avoid fake breadth:
# a primitive that unlocks ten real outcomes beats ten disconnected feature tickets.

meta:
  version: 2
  source_universe: bruce_complete_capability_universe_voice_life_finance_v2.md
  repo_commit_at_audit: be55524
  staging_commit: be55524           # api + worker share one digest; migration head 0018
  note: >
    Conversation runtime is DEPLOYED and gated by a DB capability-access decision
    (production_account_entitlement OR live staging enrollment), NOT a simple env flag — access_control.py;
    BRUCE_CONVERSATION_RUNTIME is only a global hard-OFF override. Since v1 (8bec4a5 / head 0011) the built
    wave added: DB capability-access gate + staging enrollment (0013), relay control/audit/bootstrap
    (0014-0016), magic-link single-use (0017), the ConversationContextGraph (0018, Bite 2 A2), reply-aware
    native context + authoritative reply target (A3 + P0.1), the channel-aware technical renderer (P0.2),
    and iMessage style guarantees / no-em-dash (P0.3). Live iMessage end-to-end reply flow reported
    live-verified by the operator; broader live coverage still accruing.
  # Workstream ownership partition (D-INT-4): a lane edits statuses only inside its own primitive blocks,
  # so parallel worktrees don't collide on adjacent YAML. Shared blocks are integration-owned.
  owners:
    integration: [capability_access_gate, relay_control_plane, permission_privacy_controls, universal_source_intake]
    mission-kernel: [durable_mission_engine, approval_verification, evidence_provenance]
    school-command: [school_connector_framework, canonical_academic_graph, change_detection_engine, canvas_adapter, grades_feedback, communication_adapters, calendar_execution]
    humanity: [conversation_reasoning_router, conversation_style_engine]
    trust-evals: [notification_policy]

