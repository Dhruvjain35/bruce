name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Backstop against a stuck runner / hung test (a normal run is ~3 min): the job is cancelled at 20
    # min instead of hanging for hours. A hung TEST fails faster via the per-test timeout below.
    timeout-minutes: 20
    # Real PostgreSQL 16 — the isolation/durability gate runs from a clean database on every PR.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      BRUCE_JWT_SECRET: ci-hs256-secret-at-least-32-bytes-long!!
      BRUCE_JWT_AUDIENCE: authenticated
      # owner (privileged) runs migrations; the app connects as the restricted bruce_app role.
      BRUCE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
      BRUCE_APP_DATABASE_URL: postgresql+asyncpg://bruce_app:bruce_dev_pw@localhost:5432/bruce_test
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # pip/network is the flaky-infra step; retry it (NOT the test step — tests are never masked).
      - name: Install deps (retry infra flakiness)
        run: |
          for i in 1 2 3; do
            pip install -r requirements.txt pytest-timeout && break
            echo "pip install attempt $i failed; retrying in 5s"; sleep 5
          done
      # Full suite: offline unit tests + real-Postgres adversarial integration tests.
      # The conftest fixture provisions/migrates a disposable bruce_test db and the bruce_app role.
      #   --timeout=180  : a single test may never run >180s (all real tests are <10s). A HUNG test now
      #                    FAILS with a full thread stack dump (thread method) instead of hanging the job.
      #                    This does NOT weaken tests — it bounds them, and names the culprit on a hang.
      #   --durations=25 : slowest-test visibility; junit report uploaded below for duration tracking.
      - name: Run tests
        run: python -m pytest -q --timeout=180 --timeout-method=thread --durations=25 --junitxml=pytest-report.xml
      - name: Upload test-duration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: engine/pytest-report.xml
          if-no-files-found: warn
